    <!-- Form -->
    <div class="container">
      <div class="form-template">
        <p>Lasciami un messaggio e ti risponderò il prima possibile!</p>
        <form id="contact-form">
          <input type="hidden" name="contact_number">
          <div class="row">
            <label for="colFormLabelLg" class="col-sm-2 col-form-label col-form-label-lg">Nome</label>
            <div class="col-sm-10">
              <input type="text" name="user_name" class="form-control form-control-lg" id="colFormLabelLg" placeholder="Nome e Cognome">
            </div>
          </div>
          <div class="row">
            <label for="colFormLabelLg" class="col-sm-2 col-form-label col-form-label-lg">Email</label>
            <div class="col-sm-10">
              <input type="email" name="user_email" class="form-control form-control-lg" id="colFormLabelLg" placeholder="Email">
            </div>
          </div>
          <div class="row">
            <label for="colFormLabelLg" class="col-sm-2 col-form-label col-form-label-lg">Messaggio</label>
            <div class="col-sm-10">
              <textarea name="message" class="form-control textarea" placeholder="Scrivi qui il tuo messaggio..."></textarea>
            </div>
          </div>
          <div class="row">
            <div class="col">
            </div>
            <div class="col-sm-3">
              <input type="submit" class="btn btn-primary" value="Invia">
            </div>
            <div class="col">
            </div>
          </div>
        </form>
      </div>
    </div>

   <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // https://dashboard.emailjs.com/admin/account
            emailjs.init('SHlSTKGlaEOf0p1Zq');
        })();
    </script>
    <script type="text/javascript">
        window.onload = function() {
            document.getElementById('contact-form').addEventListener('submit', function(event) {
                event.preventDefault();
                // generate a five digit number for the contact_number variable
                this.contact_number.value = Math.random() * 100000 | 0;
                // these IDs from the previous steps
                emailjs.sendForm('contact_service', 'contact_form', this)
                    .then(function() {
                        alert('Il tuo messaggio è stato inviato!');
                    }, function(error) {
                        alert('Qualcosa è andato storto!', error);
                    });
            });
        }
    </script>
